<!DOCTYPE html>
<html lang="en-us">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Duck Life 6 - Space</title>

<script src="Build/UnityLoader.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: black;
  overflow: hidden;
}

#gameContainer {
  width: 100%;
  height: 100%;
}

#loading {
  position: absolute;
  width: 100%;
  top: 50%;
  text-align: center;
  color: white;
  font-family: Arial;
  transform: translateY(-50%);
}
</style>

<script>
// 🔧 Merge split Unity files
function mergeFiles(parts) {
  return new Promise((resolve, reject) => {
    let buffers = [];

    function next(i) {
      if (i >= parts.length) {
        resolve(URL.createObjectURL(new Blob(buffers)));
        return;
      }

      fetch(parts[i])
        .then(r => r.arrayBuffer())
        .then(data => {
          buffers.push(data);
          next(i + 1);
        })
        .catch(reject);
    }

    next(0);
  });
}

function getParts(file, start, end) {
  let arr = [];
  for (let i = start; i <= end; i++) {
    arr.push(file + ".part" + i);
  }
  return arr;
}

// 🎮 Loading progress
function UnityProgress(gameInstance, progress) {
  let text = document.getElementById("loading");

  if (progress === "complete") {
    if (text) text.style.display = "none";
    return;
  }

  let percent = 0;
  if (typeof progress === "number") {
    percent = progress;
  } else if (progress.loaded && progress.total) {
    percent = progress.loaded / progress.total;
  }

  if (text) {
    text.textContent = "Loading... " + Math.round(percent * 100) + "%";
  }
}

// 🚀 MAIN LOAD
window.addEventListener("load", function () {

  fetch("Build/WebGL5Hooda.json")
    .then(r => r.json())
    .then(config => {

      return Promise.all([
        mergeFiles(getParts("Build/WebGL5Hooda.data.unityweb", 1, 3)),
        mergeFiles(getParts("Build/WebGL5Hooda.asm.code.unityweb", 1, 1)),
        mergeFiles(getParts("Build/WebGL5Hooda.asm.memory.unityweb", 1, 1)),
        mergeFiles(getParts("Build/WebGL5Hooda.asm.framework.unityweb", 1, 1))
      ])
      .then(([dataUrl, codeUrl, memoryUrl, frameworkUrl]) => {

        config.dataUrl = dataUrl;
        config.asmCodeUrl = codeUrl;
        config.asmMemoryUrl = memoryUrl;
        config.asmFrameworkUrl = frameworkUrl;

        let blob = new Blob([JSON.stringify(config)], { type: "application/json" });
        let blobUrl = URL.createObjectURL(blob);

        window.gameInstance = UnityLoader.instantiate(
          "gameContainer",
          blobUrl,
          {
            onProgress: UnityProgress,
            Module: {
              onRuntimeInitialized: function () {
                UnityProgress(window.gameInstance, "complete");
              }
            }
          }
        );
      });

    })
    .catch(err => {
      console.error("Unity failed:", err);
      document.getElementById("loading").textContent = "Failed to load game.";
    });

});
</script>

</head>

<body>

<div id="loading">Loading... 0%</div>
<div id="gameContainer"></div>

</body>
</html>
