<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ruffle Flash Game</title>

    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #111;
        }

        #flash-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn {
            position: fixed;
            top: 10px;
            z-index: 9999;
            padding: 10px 14px;
            background: #222;
            color: white;
            border: 1px solid #555;
            cursor: pointer;
        }

        #fsBtn {
            right: 10px;
        }

        #exitBtn {
            right: 120px;
        }

        .btn:hover {
            background: #333;
        }
    </style>
</head>

<body>

    <button id="fsBtn" class="btn">Fullscreen</button>
    <button id="exitBtn" class="btn">Exit</button>

    <div id="flash-container"></div>

    <script>
        // --- Ruffle setup ---
        window.RufflePlayer = window.RufflePlayer || {};
        const ruffle = window.RufflePlayer.newest();
        const player = ruffle.createPlayer();

        document.getElementById("flash-container").appendChild(player);

        player.load("duck-life.swf");

        // --- Fullscreen ---
        function goFullscreen() {
            const elem = document.documentElement;

            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) {
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) {
                elem.msRequestFullscreen();
            }
        }

        // --- Exit fullscreen ---
        function exitFullscreen() {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            } else if (document.webkitExitFullscreen) {
                document.webkitExitFullscreen();
            } else if (document.msExitFullscreen) {
                document.msExitFullscreen();
            }
        }

        document.getElementById("fsBtn").addEventListener("click", goFullscreen);
        document.getElementById("exitBtn").addEventListener("click", exitFullscreen);

        // --- Keep scaling smooth ---
        document.addEventListener("fullscreenchange", () => {
            player.style.width = "100%";
            player.style.height = "100%";
        });
    </script>

</body>
</html>
