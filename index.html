<!DOCTYPE html>
<html>
<head>
  <script src="https://unpkg.com/@ruffle-rs/ruffle/ruffle.js"></script>

  <style>
    body {
      font-family: Arial;
      background: white;
      color: black;
      transition: 0.4s;
    }

    body.dark {
      background: #121212;
      color: #f1f1f1;
    }

    button {
      padding: 10px 15px;
      background: #ddd;
      border: none;
      cursor: pointer;
    }

    body.dark button {
      background: #333;
      color: #f1f1f1;
    }

    .tabs {
      display: flex;
      gap: 5px;
    }

    .tab-button {
      height: 50px;
      background: #ddd;
      border: none;
      cursor: pointer;
    }

    .tab-button.active {
      background: orange;
      color: white;
    }

    body.dark .tab-button.active {
      background: #0088FF;
      color: black;
    }

    .tab-content {
      display: none;
      padding: 20px;
      border: 1px solid #ccc;
      margin-top: 10px;
    }

    .tab-content.active {
      display: block;
    }

    body.dark .tab-content {
      background: #1e1e1e;
      border-color: #333;
    }

    /* 🎮 LAYOUT */
    .games-layout {
      display: flex;
      gap: 10px;
    }

    .side-panel {
      width: 150px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .main-panel {
      flex: 1;
      border: 1px solid #ccc;
      padding: 10px;
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    /* 🎯 GAME PLAYER */
    .placeholder {
      aspect-ratio: 550 / 400;
      max-width: 700px;
      width: 100%;
      margin: auto;
      background: black;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border-radius: 6px;
    }

    #ruffle-player {
      width: 100%;
      height: 100%;
    }

    #ruffle-player > * {
      width: 100%;
      height: 100%;
    }

    /* 🧊 STEAM-STYLE GRID */
    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 15px;
      margin-top: 10px;
    }

    .game-card {
      background: #f0f0f0;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .game-card:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    body.dark .game-card {
      background: #2a2a2a;
    }

    .game-card img {
      width: 100%;
      height: 120px;
      object-fit: cover;
    }

    .game-title {
      padding: 10px;
      font-size: 14px;
      text-align: center;
    }
  </style>
</head>

<body>

<!-- 🧭 TABS -->
<div class="tabs">
  <button class="tab-button active" onclick="openTab('home', this)">Home</button>
  <button class="tab-button" onclick="openTab('games', this)">Games</button>
  <button class="tab-button" onclick="openTab('about', this)">About</button>
  <button onclick="toggleDarkMode()">Dark Mode</button>
</div>

<!-- 🏠 HOME -->
<div id="home" class="tab-content active">
  <h2>Home</h2>
  <p>Your game library 🎮</p>
</div>

<!-- 🎮 GAMES -->
<div id="games" class="tab-content">
  <div class="games-layout">

    <!-- SIDE NAV -->
    <div class="side-panel">
      <button onclick="showScreen('menu')">Library</button>
      <button onclick="showScreen('play')">Play</button>
    </div>

    <!-- MAIN -->
    <div class="main-panel">

      <!-- 🎮 GAME LIBRARY -->
      <div id="menu-screen" class="screen active">
        <h2>Library</h2>

        <div class="game-grid">

          <div class="game-card" onclick="loadGame('duck-life.swf')">
            <img src="images/duck1.jpg">
            <div class="game-title">Duck Life 1</div>
          </div>

          <div class="game-card" onclick="loadGame('ducklife2worldchampion.swf')">
            <img src="images/duck2.jpg">
            <div class="game-title">Duck Life 2</div>
          </div>

          <div class="game-card" onclick="loadGame('duck-life-3.swf')">
            <img src="images/duck3.jpg">
            <div class="game-title">Duck Life 3</div>
          </div>

          <div class="game-card" onclick="loadGame('duck-life-4_20210406.swf')">
            <img src="images/duck4.jpg">
            <div class="game-title">Duck Life 4</div>
          </div>

          <div class="game-card" onclick="loadGame('duck-life-treasure-hunt.swf')">
            <img src="images/duck5.jpg">
            <div class="game-title">Duck Life 5</div>
          </div>

        </div>
      </div>

      <!-- 🕹️ PLAYER -->
      <div id="play-screen" class="screen">
        <h2>Now Playing</h2>
        <div class="placeholder">
          <div id="ruffle-player"></div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- ℹ️ ABOUT -->
<div id="about" class="tab-content">
  <h2>About</h2>
</div>

<script>
let player = null;

function openTab(tabName, btn) {
  document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".tab-button").forEach(b => b.classList.remove("active"));

  document.getElementById(tabName).classList.add("active");
  btn.classList.add("active");
}

function toggleDarkMode() {
  document.body.classList.toggle("dark");
}

function showScreen(screenName) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(screenName + "-screen").classList.add("active");
}

function loadGame(file) {
  const container = document.getElementById("ruffle-player");

  const ruffle = window.RufflePlayer?.newest?.();
  if (!ruffle) return;

  if (player) {
    container.innerHTML = "";
    player = null;
  }

  player = ruffle.createPlayer();
  container.appendChild(player);

  player.load("./" + file);

  showScreen("play");
}
</script>

</body>
</html>
