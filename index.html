<!DOCTYPE html>
<html>
<head>
  <script src="https://unpkg.com/@ruffle-rs/ruffle/ruffle.js"></script>

  <style>
    body {
      font-family: Arial;
      background: white;
      color: black;
      transition: 0.4s;
    }

    body.dark {
      background: #121212;
      color: #f1f1f1;
    }

    button {
      padding: 10px 15px;
      background: #ddd;
      border: none;
      cursor: pointer;
      margin: 5px 0;
    }

    body.dark button {
      background: #333;
      color: #f1f1f1;
    }

    .tabs {
      display: flex;
      gap: 5px;
    }

    .tab-button {
      height: 50px;
      background: #ddd;
      border: none;
      cursor: pointer;
    }

    .tab-button.active {
      background: orange;
      color: white;
    }

    .tab-content {
      display: none;
      padding: 20px;
      border: 1px solid #ccc;
      margin-top: 10px;
    }

    .tab-content.active {
      display: block;
    }

    body.dark .tab-content {
      background: #1e1e1e;
      border-color: #333;
    }

    /* 🎮 layout */
    .games-layout {
      display: flex;
      gap: 10px;
    }

    .side-panel {
      width: 180px;
    }

    .main-panel {
      flex: 1;
      padding: 10px;
      border: 1px solid #ccc;
    }

    .placeholder {
      aspect-ratio: 550 / 400;
      width: 100%;
      max-width: 700px;
      margin: auto;
      background: black;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #ruffle-player {
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>

<!-- 🧭 TABS -->
<div class="tabs">
  <button class="tab-button active" onclick="openTab('home', this)">Home</button>
  <button class="tab-button" onclick="openTab('games', this)">Games</button>
  <button class="tab-button" onclick="openTab('about', this)">About</button>
</div>

<!-- 🏠 HOME -->
<div id="home" class="tab-content active">
  <h2>Home</h2>
</div>

<!-- 🎮 GAMES -->
<div id="games" class="tab-content">
  <div class="games-layout">

    <!-- 🧭 MENU (NOW FULL GAME SELECTOR) -->
    <div class="side-panel">
      <h3>Menu</h3>

      <button onclick="loadGame('duck-life.swf')">Duck Life 1</button>
      <button onclick="loadGame('ducklife2worldchampion.swf')">Duck Life 2</button>

    </div>

    <!-- 🕹️ PLAY AREA -->
    <div class="main-panel">
      <h2>Play Screen</h2>

      <div class="placeholder">
        <div id="ruffle-player"></div>
      </div>

    </div>

  </div>
</div>

<!-- ℹ️ ABOUT -->
<div id="about" class="tab-content">
  <h2>About</h2>
</div>

<script>
let player = null;

function openTab(tabName, btn) {
  document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".tab-button").forEach(b => b.classList.remove("active"));

  document.getElementById(tabName).classList.add("active");
  btn.classList.add("active");
}

/* 🎮 LOAD GAME DIRECTLY FROM MENU */
function loadGame(file) {
  const container = document.getElementById("ruffle-player");

  const ruffle = window.RufflePlayer?.newest?.();
  if (!ruffle) {
    console.error("Ruffle not loaded");
    return;
  }

  if (!player) {
    player = ruffle.createPlayer();
    container.appendChild(player);
  }

  player.load("./" + file);
}
</script>

</body>
</html>
