<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tab Website</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #111;
  color: white;
}

/* Hide radio buttons */
input[type="radio"] {
  display: none;
}

/* Tab buttons */
.tabs {
  display: flex;
  background: #222;
}

.tabs label {
  padding: 15px 20px;
  cursor: pointer;
  flex: 1;
  text-align: center;
  background: #333;
  transition: 0.2s;
}

.tabs label:hover {
  background: #444;
}

/* Content areas */
.content {
  display: none;
  padding: 20px;
  background: #181818;
  min-height: 200px;
}

/* Show active tab */
#tab1:checked ~ .content1,
#tab2:checked ~ .content2,
#tab3:checked ~ .content3 {
  display: block;
}

/* Highlight active tab */
#tab1:checked ~ .tabs label[for="tab1"],
#tab2:checked ~ .tabs label[for="tab2"],
#tab3:checked ~ .tabs label[for="tab3"] {
  background: #555;
}
</style>
</head>

<body>

<!-- Radio controls -->
<input type="radio" name="tabs" id="tab1" checked>
<input type="radio" name="tabs" id="tab2">
<input type="radio" name="tabs" id="tab3">

<!-- Tab buttons -->
<div class="tabs">
  <label for="tab1">Home</label>
  <label for="tab2">About</label>
  <label for="tab3">Games</label>
</div>

<!-- Tab content -->
<div class="content content1">
  <h2>🏠 Home</h2>
  <p>Welcome to your tabbed website!</p>
</div>

<div class="content content2">
  <h2>ℹ️ About</h2>
  <p>This website uses HTML + CSS tabs with no JavaScript.</p>
</div>

<div class="content content3">
  <h2>🎮 Games</h2>
  <p>Put your games or embeds here.</p>
  <div class="content content1">
  <h2>🏠 Home</h2>

  <div class="box">
    <h3>Welcome Panel</h3>
    <p>This is the main welcome container.</p>
  </div>

  <div class="box">
    <h3>News</h3>
    <p>Latest updates go here.</p>
  </div>

  <div class="box">
    <h3>Status</h3>
    <p>Everything is running smoothly ⚡</p>
  </div>

  </div>
</div>

</body>
</html>
