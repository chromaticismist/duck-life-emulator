<!DOCTYPE html>
<html>
<head>
  <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
  <style>
    body {
      font-family: Arial;
      background: white;
      color: black;
      transition: background 0.4s ease, color 0.4s ease;
    }

    body.dark {
      background: #121212;
      color: #f1f1f1;
    }

    button {
      padding: 10px 15px;
      background: #ddd;
      border: none;
      cursor: pointer;
      transition: 0.3s;
    }

    body.dark button {
      background: #333;
      color: #f1f1f1;
    }

    .tabs {
      display: flex;
      gap: 5px;
    }

    .tab-button {
      height: 50px;
      background: #ddd;
      border: none;
      cursor: pointer;
      transition: 0.4s;
    }

    .tab-button.active {
      background: orange;
      color: white;
    }

    body.dark .tab-button.active {
      background: #0088FF;
      color: black;
    }

    .tab-content {
      display: none;
      padding: 20px;
      border: 1px solid #ccc;
      margin-top: 10px;
      transition: 0.4s;
    }

    .tab-content.active {
      display: block;
    }

    body.dark .tab-content {
      background: #1e1e1e;
      border-color: #333;
    }

    /* GAME LAYOUT */
    .games-layout {
      display: flex;
      gap: 10px;
    }

    .side-panel {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 150px;
    }

    .main-panel {
      flex: 1;
      border: 1px solid #ccc;
      padding: 10px;
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    .placeholder {
      height: 200px;
      background: #eee;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    body.dark .placeholder {
      background: #2a2a2a;
    }

    .mode-toggle {
      height: 50px;
      background: #ddd;
    }
  </style>
</head>

<body>

<!-- TOP TABS -->
<div class="tabs">
  <button class="tab-button active" onclick="openTab('home', this)">Home</button>
  <button class="tab-button" onclick="openTab('games', this)">Games</button>
  <button class="tab-button" onclick="openTab('about', this)">About</button>
  <button class="mode-toggle" onclick="toggleDarkMode()">Dark Mode</button>
</div>

<!-- HOME -->
<div id="home" class="tab-content active">
  <h2>Home</h2>
  <p>Welcome 🌟</p>
</div>

<!-- GAMES (FIXED SINGLE VERSION) -->
<div id="games" class="tab-content">
  <div class="games-layout">

    <!-- SIDE MENU -->
    <div class="side-panel">
      <button onclick="showScreen('menu')">Menu</button>
      <button onclick="showScreen('play')">Play</button>
      <button onclick="showScreen('settings')">Settings</button>
    </div>

    <!-- MAIN AREA -->
    <div class="main-panel">

      <div id="menu-screen" class="screen active">
        <h2>Games Menu</h2>
        <p>Select an option 🎮</p>
      </div>

      <div id="play-screen" class="screen">
        <h2>Play Screen</h2>
        <div class="placeholder">
  <div id="ruffle-player"></div>
</div>
      </div>

      <div id="settings-screen" class="screen">
        <h2>Settings</h2>
        <p>Adjust game settings ⚙️</p>
      </div>

    </div>

  </div>
</div>

<!-- ABOUT -->
<div id="about" class="tab-content">
  <h2>About</h2>
  <p>This is the about tab 🧠</p>
</div>

<script>
function openTab(tabName, btn) {
  let contents = document.querySelectorAll(".tab-content");
  contents.forEach(tab => tab.classList.remove("active"));

  let buttons = document.querySelectorAll(".tab-button");
  buttons.forEach(b => b.classList.remove("active"));

  document.getElementById(tabName).classList.add("active");
  btn.classList.add("active");
}

function toggleDarkMode() {
  document.body.classList.toggle("dark");
}

function showScreen(screenName) {
  let screens = document.querySelectorAll(".screen");
  screens.forEach(s => s.classList.remove("active"));

  document.getElementById(screenName + "-screen").classList.add("active");
}
</script>
  <script>
function loadGame() {
  const ruffle = window.RufflePlayer.newest();
  const player = ruffle.createPlayer();

  document.getElementById("ruffle-player").appendChild(player);

  player.load("duck-life.swf");
}
</script>

</body>
</html>
